services:
  - type: web
    name: nthakaguide-api
    env: python
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: GIT_LFS_ENABLED
        value: true
